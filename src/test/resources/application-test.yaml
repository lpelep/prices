spring:
  application:
    name: price-service-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  level:
    com.inditex.prices: DEBUG
    org.springframework.cache: TRACE
    org.hibernate.SQL: DEBUG
